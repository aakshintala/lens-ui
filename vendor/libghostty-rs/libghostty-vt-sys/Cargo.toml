[package]
name = "libghostty-vt-sys"
description = "Raw FFI bindings for libghostty-vt, the Ghostty terminal emulation library"
# Vendored + EXCLUDED from the Lens workspace (root Cargo.toml `exclude`),
# consumed via path deps. Workspace-inherited fields are flattened to literals:
# an excluded crate has no workspace to inherit `*.workspace = true` from.
# Pin/provenance recorded in ../README.md + ../provenance.toml.
version = "0.2.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uzaaft/libghostty-rs"
rust-version = "1.90"
links = "ghostty-vt"
build = "build.rs"

[lib]
doctest = false

[features]
default = ["vendored"]
vendored = []
pkg-config = ["dep:pkg-config"]
link-dynamic = []
bindgen-tool = ["dep:bindgen", "dep:libc", "dep:heck"]
kitty-graphics = []

[dependencies]
bindgen = {version = "0.72.1", optional = true}
libc = {version = "0.2", optional = true}
heck = {version = "0.5", optional = true}

[build-dependencies]
pkg-config = { version = "0.3", optional = true }

[[bin]]
name = "gen-bindings"
path = "tools/gen_bindings.rs"
required-features = ["bindgen-tool"]
