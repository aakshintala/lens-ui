<!doctype html>
<html><head><meta charset="utf-8"><title>Activity-line · spinner vs dot + realistic board</title>
<style>
  :root{
    --bg:#07080b;--bg1:#101319;--bg2:#151922;--bg3:#1c2230;
    --line:#222936;--line2:#2c3442;--tx:#eef2f7;--tx2:#9aa4b3;--tx3:#5f6a7a;
    --amber:#eab308;--red:#ff5d5d;--green:#36c98a;
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--tx);margin:0;padding:28px 32px 60px;
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;-webkit-font-smoothing:antialiased}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--tx2);margin:0 0 22px;font-size:12.5px;max-width:840px}
  h2{font-size:14px;margin:30px 0 3px}
  h2 .tag{color:var(--tx3);font-weight:400;margin-left:8px;font-size:12px}
  .lbl{font-size:11px;color:var(--tx3);margin:14px 0 6px}
  .row{display:flex;gap:22px;flex-wrap:wrap}
  hr{border:0;border-top:1px solid var(--line);margin:34px 0 0}

  .card{position:relative;width:280px;min-height:160px;border:2px solid var(--c);border-radius:12px;
    overflow:hidden;padding:8px;display:flex;flex-direction:column;gap:6px}
  .card.grad{background:linear-gradient(135deg, color-mix(in srgb,var(--c) 24%, transparent) 0%, transparent 100%)}
  .card.flat{background:color-mix(in srgb,var(--c) 14%, transparent)}
  .card.faint{background:color-mix(in srgb,var(--c) 8%, transparent)}
  .card.dim .stack,.card.dim .act,.card.dim .repos,.card.dim .meta,.card.dim .pbar,.card.dim .tile{opacity:.5}

  .hdr{display:flex;align-items:center;gap:8px}
  .tile{width:44px;height:44px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;
    color:var(--c);background:color-mix(in srgb,var(--c) 14%, var(--bg2));border:1px solid color-mix(in srgb,var(--c) 30%, transparent)}
  .tile svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tile.spin svg{animation:rot 1.1s linear infinite;transform-origin:50% 50%}
  @keyframes rot{to{transform:rotate(360deg)}}
  .stack{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .st{font-size:10px;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
  .title{font-size:15px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
  .model{font-size:10px;color:var(--tx2);line-height:1.4}
  .apill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px;background:var(--c);color:#0b0e14;flex:none}
  .kebab{color:var(--tx2);align-self:flex-start}

  .act{font-size:12px;color:var(--tx);display:flex;align-items:center;gap:6px;min-height:16px}
  .act.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px}
  .act.colored{color:var(--c)}
  .dot{width:6px;height:6px;flex:none;border-radius:50%;background:var(--c)}
  .xmark{color:var(--c);font-weight:700;flex:none;font-size:12px;line-height:1}
  .pulse{animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.82)}}

  .repos{font-size:12px;color:var(--tx2);display:flex;gap:8px}
  .meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tx2)}
  .hostpill{font-size:11px;color:var(--tx);background:var(--bg3);border:1px solid var(--line2);border-radius:6px;padding:1px 6px}
  .pbar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:auto}
  .pbar i{display:block;height:100%}
  .empty{color:var(--tx3)}
</style></head>
<body>
  <h1>Working: pulse-dot vs spinner-only — and the realistic board</h1>
  <p class="sub">The Working tile spinner is now <b>animating</b> (like the app). Question: with the tile already spinning,
  is the pulse dot on the activity line redundant? Compare below. All live lines are <b>mono</b> (locked).</p>
  <div id="mount"></div>

<script>
const G={
  bell:'<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.9 1.9 0 0 0 3.4 0"/>',
  alert:'<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  dot:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  spin:'<path d="M21 12a9 9 0 1 1-6.2-8.5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>',
  coffee:'<path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><path d="M6 2v2M10 2v2M14 2v2"/>',
};
const svg=k=>`<svg viewBox="0 0 24 24">${G[k]}</svg>`;
const fillFor=p=>p<=50?'var(--green)':p<=75?'var(--amber)':'var(--red)';

// mode: 'dot-mono' | 'mono' | 'x-pulse' | 'colored' | 'blank'
function actHTML(m, mode){
  if(mode==='blank' || !m.act) return `<div class="act"><span class="empty">&nbsp;</span></div>`;
  if(mode==='dot-mono') return `<div class="act mono"><span class="dot pulse"></span><span>${m.act}</span></div>`;
  if(mode==='mono')     return `<div class="act mono"><span>${m.act}</span></div>`;
  if(mode==='x-pulse')  return `<div class="act mono"><span class="xmark pulse">✕</span><span>${m.act}</span></div>`;
  if(mode==='colored')  return `<div class="act mono colored"><span>${m.act}</span></div>`;
  return `<div class="act"><span>${m.act}</span></div>`;
}
function card(m, mode){
  const action = m.action ? `<div class="apill">${m.action}</div>` : '';
  const tileCls = 'tile' + (m.glyph==='spin' ? ' spin' : '');
  return `<div class="card ${m.wash} ${m.dim?'dim':''}" style="--c:${m.c}">
    <div class="hdr">
      <div class="${tileCls}">${svg(m.glyph)}</div>
      <div class="stack"><div class="st">${m.st}</div><div class="title">${m.title}</div><div class="model">claude-sdk · opus</div></div>
      ${action}<div class="kebab">⋮</div>
    </div>
    ${actHTML(m, mode)}
    <div class="repos">📁 lens &nbsp;·&nbsp; ⑂ feat/multi-session</div>
    <div class="meta"><span class="hostpill">lens</span><span>~$0.42</span><span>${m.pct}%</span></div>
    <div class="pbar"><i style="width:${m.pct}%;background:${fillFor(m.pct)}"></i></div>
  </div>`;
}

const WORK ={c:'#36c98a',wash:'flat',st:'WORKING',title:'Refactor the session poller',act:'running the test suite…',glyph:'spin',pct:65};
const WORK2={c:'#36c98a',wash:'flat',st:'WORKING',title:'Wire the SSE feed',act:'bash',glyph:'spin',pct:41};

const BOARD_DOT=[
  {c:'#ff8a3d',wash:'grad',st:'NEEDS INPUT',title:'Approve: run `rm -rf build/`?',glyph:'bell',pct:24,act:'',mode:'blank'},
  {c:'#ff5d5d',wash:'grad',st:'FAILED',title:'cargo build',act:'E0432: unresolved import',glyph:'alert',pct:90,action:'Retry',mode:'x-pulse'},
  {c:'#c084fc',wash:'grad',st:'AWAITING REVIEW',title:'Review the draft spec on the Canvas',glyph:'dot',pct:24,act:'',mode:'blank'},
  {c:'#4c8dff',wash:'grad',st:'READY',title:'Finished — reply with a greeting',glyph:'check',pct:24,act:'',mode:'blank'},
  {...WORK, mode:'dot-mono'},
  {c:'#8b9bf5',wash:'flat',st:'SCHEDULED',title:'Follow-up check scheduled',act:'wakes in 44m 56s',glyph:'clock',pct:24,mode:'colored'},
  {c:'#7a8493',wash:'none',st:'SLEPT',title:'Archived brainstorm',glyph:'moon',pct:24,act:'',mode:'blank',dim:true,action:'Wake'},
  {c:'#eab308',wash:'faint',st:'IDLE',title:'Fresh session — no activity yet',glyph:'coffee',pct:24,act:'',mode:'blank'},
];
const BOARD_NODOT = BOARD_DOT.map(m => m.st==='WORKING' ? {...m, mode:'mono'} : m);

let html = '<h2>Working — dot vs spinner-only <span class="tag">tile is spinning; is the dot redundant?</span></h2>';
html += `<div class="lbl">A · pulse dot + mono (dot present)</div><div class="row">${card(WORK,'dot-mono')}${card(WORK2,'dot-mono')}</div>`;
html += `<div class="lbl">B · mono only, no dot (spinner carries "live")</div><div class="row">${card(WORK,'mono')}${card(WORK2,'mono')}</div>`;

html += '<hr><h2 style="margin-top:24px">Realistic board — WITH the Working dot</h2>';
html += `<div class="row">${BOARD_DOT.map(m=>card(m,m.mode)).join('')}</div>`;
html += '<h2 style="margin-top:26px">Realistic board — WITHOUT the Working dot</h2>';
html += `<div class="row">${BOARD_NODOT.map(m=>card(m,m.mode)).join('')}</div>`;

document.getElementById('mount').innerHTML = html;
</script>
</body></html>
