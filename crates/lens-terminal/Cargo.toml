[package]
name = "lens-terminal"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
gpui = "0.2.2"
lens-client = { path = "../lens-client" }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
# NOTE: `libghostty-vt` (the VT engine) is intentionally NOT a dependency yet.
# It lands in Slice 1b, when the engine worker actually drives `vt_write`.
# Pulling it in earlier would trigger the pinned-Ghostty `build.rs` source
# fetch/build for a skeleton that does not use it. See the workstream design,
# "VT foundation".

[dev-dependencies]
gpui = { version = "0.2.2", features = ["test-support"] }
serde_json = "1"
